version: '3.8'

services:
  bot:
    build: .
    container_name: ai-paper-bot
    restart: always
    env_file:
      - .env
    volumes:
      - ./data:/app/data
    environment:
      # Override DB_PATH via environment variables to ensure it persists in the volume map
      - DB_PATH=/app/data/papers.db

  sqlite-web:
    image: coleifer/sqlite-web
    container_name: sqlite-admin
    restart: always
    ports:
      - "8080:8080"
    volumes:
      - ./data:/data
    command: sqlite_web -H 0.0.0.0 -x /data/papers.db
